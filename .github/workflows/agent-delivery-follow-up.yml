name: Agent Delivery Follow-Up

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      railway_url:
        description: "Railway base URL override"
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  follow-up:
    name: Verify main push and Railway runtime
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RAILWAY_URL: ${{ inputs.railway_url || secrets.RAILWAY_URL || vars.RAILWAY_URL }}
      BACKEND_URL: ${{ secrets.BACKEND_URL || vars.BACKEND_URL || 'https://backend-production-d3da.up.railway.app' }}
      ORCHESTRATOR_URL: ${{ secrets.ORCHESTRATOR_URL || vars.ORCHESTRATOR_URL || 'https://orchestrator-production-c27e.up.railway.app' }}
      BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY || secrets.ORCHESTRATOR_BEARER }}
      TARGET_BRANCH: ${{ github.event.deployment.ref || github.ref_name }}
      TARGET_SHA: ${{ github.event.deployment.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha || github.sha }}

      - name: Setup Node.js when package.json exists
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        if: ${{ hashFiles('scripts/verify_deploy_stack.py') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies when package.json exists
        if: ${{ hashFiles('package.json') != '' }}
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Wait until orchestrator is healthy
        if: ${{ env.RAILWAY_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          until curl -fsSL "${ORCHESTRATOR_URL}/health" | grep -Eq '"status":"(ok|healthy)"'; do
            sleep 5
          done
          echo "READY"

      - name: Run targeted deploy verification
        if: ${{ hashFiles('scripts/verify_deploy_stack.py') != '' && env.RAILWAY_URL != '' }}
        shell: bash
        run: python scripts/verify_deploy_stack.py --service orchestrator --mode targeted --json

      - name: Run full-stack deploy verification
        if: ${{ hashFiles('scripts/verify_deploy_stack.py') != '' && env.RAILWAY_URL != '' }}
        shell: bash
        run: python scripts/verify_deploy_stack.py --service backend --mode full-stack --json

      - name: Run production smoke script when available
        if: ${{ hashFiles('package.json') != '' && env.RAILWAY_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['test:production'] ? 0 : 1)"; then
            npm run test:production
          else
            echo "No test:production script present; health check only"
          fi

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "### Agent Delivery Follow-Up"
            echo ""
            echo "- Commit: \`${TARGET_SHA}\`"
            echo "- Branch: \`${TARGET_BRANCH}\`"
            if [ -n "${RAILWAY_URL:-}" ]; then
              echo "- Railway URL: \`${RAILWAY_URL}\`"
            else
              echo "- Railway URL: not configured"
            fi
            echo "- Result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open follow-up issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = process.env.TARGET_SHA || context.sha;
            const branch = process.env.TARGET_BRANCH || context.ref;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment follow-up failed on main: ${sha.slice(0, 7)}`,
              body: [
                '## Agent Delivery Follow-Up Failure',
                '',
                `- Commit: ${sha}`,
                `- Branch: ${branch}`,
                `- Workflow: ${context.workflow}`,
                '',
                'The repository reached `main`, but the required Railway/runtime follow-up did not complete successfully.',
                'The executing agent remains accountable for verification and remediation.',
                '',
                `[Open workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})`
              ].join('\n'),
              labels: ['deployment', 'follow-up', 'main']
            });
