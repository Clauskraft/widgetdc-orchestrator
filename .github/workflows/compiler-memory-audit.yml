name: Domain Compiler Memory Audit

on:
  schedule:
    # Weekly Monday 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: LearnedOperator Growth Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run audit
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          BACKEND_API_KEY: ${{ secrets.BACKEND_API_KEY }}
        run: |
          python scripts/compiler_memory_audit.py --json > audit-report.json
          python scripts/compiler_memory_audit.py

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiler-memory-audit
          path: audit-report.json
          retention-days: 90

      - name: Slack notification (weekly summary)
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            TOTAL=$(python -c "import json; print(json.load(open('audit-report.json'))['total_patterns'])")
            HITS=$(python -c "import json; print(json.load(open('audit-report.json'))['total_hits'])")
            ACTIVE=$(python -c "import json; print(json.load(open('audit-report.json'))['active_patterns'])")
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"Domain Compiler Weekly Audit: ${TOTAL} patterns, ${HITS} hits, ${ACTIVE} active. Full report: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$SLACK_WEBHOOK_URL"
          fi
