name: Open WebUI Drift Check

on:
  schedule:
    # Nightly at 06:00 UTC
    - cron: '0 6 * * *'
  pull_request:
    branches: [main]
    paths:
      - 'owui-tools/**'
      - 'pipelines/widgetdc_*.py'
      - 'scripts/check_owui_drift.py'
  workflow_dispatch:

jobs:
  drift-check:
    name: Open WebUI Tool Drift Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run drift check
        id: drift
        env:
          OWUI_URL: ${{ secrets.OWUI_URL }}
          OWUI_TOKEN: ${{ secrets.OWUI_TOKEN }}
          OWUI_EMAIL: ${{ secrets.OWUI_EMAIL }}
          OWUI_PASSWORD: ${{ secrets.OWUI_PASSWORD }}
        run: |
          set +e
          python scripts/check_owui_drift.py --json > drift-report.json 2> drift-error.txt
          EXIT_CODE=$?
          export EXIT_CODE
          echo "EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("drift-report.json")
          try:
              json.loads(report_path.read_text(encoding="utf-8"))
          except Exception:
              error_text = Path("drift-error.txt").read_text(encoding="utf-8").strip()
              report_path.write_text(
                  json.dumps(
                      {
                          "exit_code": int(os.environ.get("EXIT_CODE", "0") or "0"),
                          "error": error_text,
                          "untracked_drift": [],
                          "missing_deployment": [],
                      },
                      indent=2,
                      ensure_ascii=False,
                  ),
                  encoding="utf-8",
              )
          PY
          python scripts/check_owui_drift.py || true

      - name: Upload drift report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owui-drift-report
          path: drift-report.json
          retention-days: 30

      - name: Build PR comment body
        if: github.event_name == 'pull_request' && env.EXIT_CODE != '0'
        id: body
        run: |
          {
            echo 'COMMENT<<EOF'
            python - <<'PY'
            import json

            report = json.load(open('drift-report.json', encoding='utf-8'))
            error = report.get('error')
            if error:
                print('## Open WebUI Drift Check Failed')
                print()
                print('The workflow could not complete the live OWUI verification step cleanly.')
                print()
                print('```text')
                print(error[:4000])
                print('```')
            else:
                print('## Open WebUI Drift Detected')
                print()
                print(f'**Untracked (deployed but no git source):** {len(report["untracked_drift"])}')
                for tool_id in report['untracked_drift']:
                    print(f'- `{tool_id}`')
                print()
                print(f'**Missing deployment (in git but not deployed):** {len(report["missing_deployment"])}')
                for tool_id in report['missing_deployment']:
                    print(f'- `{tool_id}`')
            PY
            echo ''
            echo 'See `scripts/check_owui_drift.py` for remediation.'
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Comment on PR (if drift detected)
        if: github.event_name == 'pull_request' && env.EXIT_CODE != '0'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.body.outputs.COMMENT }}

      - name: Slack alert on drift (scheduled runs)
        if: github.event_name == 'schedule' && env.EXIT_CODE != '0'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"Open WebUI drift detected — workflow run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
              "$SLACK_WEBHOOK_URL"
          fi

      - name: Fail job if drift detected
        if: env.EXIT_CODE != '0'
        run: exit 1
