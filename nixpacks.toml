# WidgeTDC Orchestrator — nixpacks build config
# dist/ is pre-built locally and committed to git (contracts bundled by esbuild)
# Railway only needs runtime deps — devDeps include file: refs that don't exist here

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --omit=dev"]

[start]
cmd = "node dist/index.js"
